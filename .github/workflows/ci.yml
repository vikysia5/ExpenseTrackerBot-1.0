name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        env:
         SUPABASE_URL: https://test.supabase.co
         SUPABASE_KEY: fake.fake.fake
         SUPABASE_SERVICE_KEY: fake.fake.fake
         JWT_SECRET: test-jwt-secret-for-ci-only
         TELEGRAM_BOT_TOKEN: fake-telegram-token
        run: |
          cd backend
          pytest --cov=src --cov-fail-under=50 -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t expense-tracker:test ./backend

      - name: Test container starts
        run: |
          docker run -d --name test-ct -p 8000:8000 \
            -e SUPABASE_URL=https://test.supabase.co \
            -e SUPABASE_KEY=fake.fake.fake \
            -e SUPABASE_SERVICE_KEY=fake.fake.fake \
            -e JWT_SECRET=test-jwt-secret \
            -e TELEGRAM_BOT_TOKEN=fake-telegram-token \
            expense-tracker:test
          sleep 5
          docker stop test-ct
